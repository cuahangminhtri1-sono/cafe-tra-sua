function svgBars(data, color='var(--jade)'){
  if(!data.length) return '<div class="muted tiny">Không có dữ liệu</div>';
  const W=Math.max(320, data.length*46), H=160, pad=24, mx=Math.max(1,...data.map(d=>d.value));
  const bw=(W-pad*2)/data.length*0.62, gap=(W-pad*2)/data.length;
  let bars='',labels='';
  data.forEach((d,i)=>{ const bh=(d.value/mx)*(H-pad*2); const x=pad+i*gap+(gap-bw)/2; const y=H-pad-bh;
    bars+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="3" fill="'+color+'" opacity="0.9"></rect>';
    if(d.value>0) bars+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" fill="#9DB3AA" font-size="9" text-anchor="middle">'+shortNum(d.value)+'</text>';
    labels+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(H-8)+'" fill="#6F8A80" font-size="10" text-anchor="middle">'+esc(d.label)+'</text>'; });
  return '<div style="overflow-x:auto"><svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="max-width:100%;min-width:'+Math.min(W,600)+'px">'+bars+labels+'</svg></div>';
}
function shortNum(n){ if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return Math.round(n/1e3)+'k'; return String(n); }

function exportData(){ const data={__trosafe:true,version:st().meta.version,exportedTs:Date.now()};

  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='TroSafe-backup-'+dayKey(Date.now())+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000); toast('Đã tạo file sao lưu','ok');
}

function doImport(e){ const file=e.target.files[0]; if(!file) return; const rd=new FileReader();
  rd.onload=()=>{ try{ const data=JSON.parse(rd.result); if(!data.__trosafe){ toast('File không hợp lệ','err'); return; }
    confirmBox('Khôi phục sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại. Tiếp tục?',async()=>{
      S.COLLECTIONS.forEach(c=>{ if(data[c]!==undefined) st()[c]=data[c]; });
      S.COLLECTIONS.forEach(c=>markDirty(c)); await S.flush();
      toast('Đã khôi phục dữ liệu','ok'); currentShiftRestore(); refreshShiftBadge(); go('dashboard');
    });
  }catch(err){ toast('Lỗi đọc file: '+err.message,'err'); } };
  rd.readAsText(file); e.target.value='';
}

/* --- Bluetooth ESC/POS (beta) --- */
let btChar=null;
async function btConnect(){
  if(!navigator.bluetooth){ toast('Trình duyệt không hỗ trợ Bluetooth (dùng Chrome + HTTPS)','err',3200); return; }
  try{
    const dev=await navigator.bluetooth.requestDevice({ acceptAllDevices:true, optionalServices:[0x18F0,0xFF00,0xFFE0,'000018f0-0000-1000-8000-00805f9b34fb'] });
    const srv=await dev.gatt.connect();
    const services=await srv.getPrimaryServices();
    for(const s of services){ const chars=await s.getCharacteristics(); for(const c of chars){ if(c.properties.write||c.properties.writeWithoutResponse){ btChar=c; break; } } if(btChar) break; }
    if(btChar){ toast('Đã kết nối máy in Bluetooth','ok'); } else toast('Không tìm thấy kênh in','err');
  }catch(e){ toast('Kết nối thất bại: '+e.message,'err',3000); }
}
function encItem(s){ const enc=new TextEncoder(); // hỗ trợ ASCII; tiếng Việt sẽ bỏ dấu để tương thích máy nhiệt phổ thông
  return enc.encode(deaccent(s)); }
function deaccent(str){ return String(str).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D'); }
async function btWrite(bytes){ if(!btChar){ await btConnect(); if(!btChar) return false; }
  const CH=180; for(let i=0;i<bytes.length;i+=CH){ const chunk=bytes.slice(i,i+CH);
    if(btChar.properties.writeWithoutResponse) await btChar.writeValueWithoutResponse(chunk); else await btChar.writeValue(chunk); await new Promise(r=>setTimeout(r,18)); }
  return true; }
function receiptText(o){ const s=st().settings; const W=s.paperWidth==58?32:42; const line='-'.repeat(W)+'\n';
  const ctr=t=>{ t=deaccent(t); const p=Math.max(0,Math.floor((W-t.length)/2)); return ' '.repeat(p)+t+'\n'; };
  const lr=(l,r)=>{ l=deaccent(l);r=deaccent(String(r)); const sp=Math.max(1,W-l.length-r.length); return l+' '.repeat(sp)+r+'\n'; };
  let t=ctr(s.shopName); if(s.phone)t+=ctr('DT: '+s.phone); t+=line; t+=deaccent(o.code||'')+'\n'+new Date(o.ts).toLocaleString('vi-VN')+'\n'+line;
  o.items.forEach(l=>{ t+=deaccent(l.name)+'\n'; t+=lr('  '+l.qty+' x '+num(l.lineTotal/l.qty), num(l.lineTotal)); });
  t+=line; t+=lr('TAM TINH',num(o.subtotal)); if(o.discountAmount)t+=lr('GIAM'+(o.promoName?'*':''),' -'+num(o.discountAmount)); if(o.vat)t+=lr('VAT',num(o.vat));
  t+=lr('TONG CONG',num(o.total)); if(o.method==='cash'&&o.given){ t+=lr('KHACH DUA',num(o.given)); t+=lr('THOI LAI',num(o.change)); }
  t+=line; if(s.receiptFooter)t+=ctr(s.receiptFooter); t+='\n\n\n'; return t; }
function kitchenText(o){ const W=st().settings.paperWidth==58?32:42; let t='\x1B\x21\x30'; // double size
  t+=deaccent('PHIEU PHA CHE')+'\n'; t+='\x1B\x21\x00'; t+=(o.tableId?deaccent((tableById(o.tableId)||{}).name||''):'')+'\n'+'-'.repeat(W)+'\n';
  o.items.forEach(l=>{ t+='\x1B\x21\x10'+l.qty+'x '+deaccent(l.name)+'\x1B\x21\x00\n'; const opt=[l.sizeName,l.sugar,l.ice].filter(Boolean).join(', '); if(opt)t+='  '+deaccent(opt)+'\n'; if(l.note)t+='  * '+deaccent(l.note)+'\n'; });
  t+='\n\n\n'; return t; }
async function btPrintText(text,opt){ opt=opt||{};
  const parts=[new Uint8Array([0x1B,0x40]), new TextEncoder().encode(text), new Uint8Array([0x1D,0x56,0x00])];
  if(opt.drawer) parts.push(new Uint8Array([0x1B,0x70,0x00,0x19,0xFA]));   // mo ket tien (ESC p)
  const len=parts.reduce((s,p)=>s+p.length,0); const all=new Uint8Array(len); let off=0; parts.forEach(p=>{all.set(p,off);off+=p.length;});
  const ok=await btWrite(all); if(!ok) toast('Chưa kết nối máy in','warn'); }
window.__btReceiptFromOrder=async(o)=>{ await btPrintText(receiptText(o)); };

function rangeOf(f){ const now=new Date(); const sod=d=>{ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }; const eod=d=>{ const x=new Date(d); x.setHours(23,59,59,999); return x.getTime(); };
  if(f==='today') return {start:sod(now),end:eod(now),label:'Hôm nay · '+dfmt.format(now)};
  if(f==='yesterday'){ const y=new Date(now); y.setDate(y.getDate()-1); return {start:sod(y),end:eod(y),label:'Hôm qua · '+dfmt.format(y)}; }
  if(f==='7d'){ const s=new Date(now); s.setDate(s.getDate()-6); return {start:sod(s),end:eod(now),label:'7 ngày qua'}; }
  if(f==='30d'){ const s=new Date(now); s.setDate(s.getDate()-29); return {start:sod(s),end:eod(now),label:'30 ngày qua'}; }
  if(f==='month'){ const s=new Date(now.getFullYear(),now.getMonth(),1); return {start:sod(s),end:eod(now),label:'Tháng này'}; }
  return {start:0,end:eod(now),label:'Tất cả'};
}
function rangeChips(cur, fn){ return [['today','Hôm nay'],['yesterday','Hôm qua'],['7d','7 ngày'],['30d','30 ngày'],['month','Tháng này'],['all','Tất cả']].map(([k,l])=>'<button class="chip'+(cur===k?' on':'')+'" onclick="'+fn+'(\''+k+'\')">'+l+'</button>').join(' '); }
function tab(k,l,fn){ const active=(k===menuTab||k===invTab); return '<button class="chip'+(active?' on':'')+'" onclick="'+fn+'(\''+k+'\')">'+l+'</button>'; }

function tiersOf(){ const t=st().settings.tiers; return Array.isArray(t)&&t.length?t:[{name:'Thành viên',min:0,pct:0}]; }
function tierOf(c){ if(!c) return null; const spent=Number(c.totalSpent)||0; let cur=null;
  tiersOf().forEach(t=>{ if(spent>=(Number(t.min)||0)) cur=t; }); return cur; }

/* ---- Khuyến mãi tự động + voucher ---- */
function promoTimeOk(p,d){
  if(Array.isArray(p.days)&&p.days.length&&!p.days.includes(d.getDay())) return false;
  const hm=d.getHours()*60+d.getMinutes();
  const parse=t=>{ if(!t) return null; const m=String(t).match(/^(\d{1,2}):(\d{2})$/); return m?(+m[1]*60+ +m[2]):null; };
  const f=parse(p.hFrom), to=parse(p.hTo);
  if(f!==null&&hm<f) return false;
  if(to!==null&&hm>=to) return false;
  return true;
}
function promoBaseAmount(p){
  let s=0;
  cart.lines.forEach(l=>{
    if(p.scope==='category'){ const pr=l.productId?findProduct(l.productId):null; if(!(pr&&pr.catId===p.refId)) return; }
    else if(p.scope==='product'){ if(l.productId!==p.refId) return; }
    s+=calcLineUnit(l)*l.qty;
  });
  return s;
}
function promoDiscAmount(p){
  if(p.active===false) return 0;
  const base=promoBaseAmount(p); if(base<=0) return 0;
  const subtotal=cart.lines.reduce((s,l)=>s+calcLineUnit(l)*l.qty,0);
  if((Number(p.minTotal)||0)>subtotal) return 0;
  if(!promoTimeOk(p,new Date())) return 0;
  const v=Number(p.value)||0;
  return Math.min(base, p.type==='percent'?Math.round(base*v/100):Math.round(v));
}
function recalcAutoDisc(){
  if(cart.manualDisc) return;
  let bestA=0,bestN='';
  if(cart.voucher){
    const p=st().promotions.find(x=>x.id===cart.voucher);
    const a=p?promoDiscAmount(p):0;
    if(a>0){ bestA=a; bestN='🎟️ '+p.name; } else cart.voucher=null;
  }
  if(!cart.voucher){
    st().promotions.filter(p=>!p.code).forEach(p=>{ const a=promoDiscAmount(p); if(a>bestA){bestA=a;bestN='🎁 '+p.name;} });
  }
  const c=cart.customerId?customerById(cart.customerId):null; const t=tierOf(c);
  if(t&&Number(t.pct)>0){
    const sub=cart.lines.reduce((s,l)=>s+calcLineUnit(l)*l.qty,0);
    const a=Math.round(sub*Number(t.pct)/100);
    if(a>bestA){ bestA=a; bestN='🏅 Hạng '+t.name+' -'+t.pct+'%'; }
  }
  cart.discount={type:'amount',value:bestA}; cart.promoName=bestA>0?bestN:null;
}

let _seenOrders=null,_audioCtx=null;
function beep(){ try{
  if(st().settings.newOrderSound===false) return;
  const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
  _audioCtx=_audioCtx||new AC();
  const t=_audioCtx.currentTime;
  [[880,0],[1318,0.15]].forEach(([f,d])=>{ const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
    o.frequency.value=f; o.type='sine'; o.connect(g); g.connect(_audioCtx.destination);
    g.gain.setValueAtTime(0.0001,t+d); g.gain.exponentialRampToValueAtTime(0.28,t+d+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+d+0.13);
    o.start(t+d); o.stop(t+d+0.15); });
}catch(e){} }

}catch(e){} }

function doSplit(tableId){
  const t=tableById(tableId); const o=st().orders.find(x=>x.id===t.currentOrderId); if(!o) return;
  const take=[]; o.items.forEach((l,i)=>{ const q=clamp(Number(($('#_sp_'+i)||{}).value)||0,0,l.qty); if(q>0) take.push({i,q}); });
  if(!take.length){ toast('Chọn ít nhất 1 món để tách','warn'); return; }
  const all=take.length===o.items.length&&take.every(x=>x.q===o.items[x.i].qty);
  if(all){ toast('Tách toàn bộ = Chuyển bàn — dùng nút ↔️ Chuyển bàn','warn'); return; }
  const newItems=[];
  take.forEach(({i,q})=>{ const l=o.items[i]; const nl={...l,qty:q,lineId:uid('l')}; nl.lineTotal=calcLineUnit(nl)*q; newItems.push(nl);
    l.qty-=q; l.lineTotal=calcLineUnit(l)*l.qty; });
  o.items=o.items.filter(l=>l.qty>0); o.kdsLines=null; recalcOpenOrder(o);
  const toId=$('#_spto').value||null;
  const n={ id:uid('o'), code:null, ts:Date.now(), type:toId?'dinein':'takeaway', tableId:toId, customerId:null,
    staffId:S.user?S.user.id:null, shiftId:S.shift?S.shift.id:null, items:newItems,
    subtotal:0, discount:{type:'amount',value:0}, discountAmount:0, redeem:0, vat:0, vatPct:st().settings.vatPct, total:0,
    status:'open', note:'Tách từ '+t.name, kdsLines:newItems.map(()=>true), kdsDone:Date.now() };

  toast('Đã tách '+newItems.length+' món'+(toId?(' sang '+((tableById(toId)||{}).name||'')):' — thanh toán ở mục Đơn hàng'),'ok',2800);

function doMerge(fromId,toId){
  const tf=tableById(fromId), tt=tableById(toId);
  const a=st().orders.find(x=>x.id===tf.currentOrderId), b=st().orders.find(x=>x.id===tt.currentOrderId);
  if(!a||!b) return;
  const oldK=(b.kdsLines&&b.kdsLines.length===b.items.length)?b.kdsLines.slice():b.items.map(()=>false);
  const addK=(a.kdsLines&&a.kdsLines.length===a.items.length)?a.kdsLines.slice():a.items.map(()=>false);
  a.items.forEach(l=>b.items.push({...l,lineId:uid('l')}));
  b.kdsLines=oldK.concat(addK); b.kdsDone=b.kdsLines.every(Boolean)?(b.kdsDone||Date.now()):null;
  recalcOpenOrder(b);
  a.status='void'; a.voidReason='Gộp vào '+tt.name;
  tf.status='empty'; tf.currentOrderId=null;
  markDirty('orders'); markDirty('tables'); closeModal(); viewTables(); toast('Đã gộp vào '+tt.name,'ok');
}

    const snap=await getDoc(doc(db,'accounts',uid));
    if(!snap.exists())return{ok:false,reason:'pending'};
    const a=snap.data();
    if(a.active===false)return{ok:false,reason:'locked'};
    if(a.paidUntil){ const until=a.paidUntil.toDate?a.paidUntil.toDate():new Date(a.paidUntil);
      if(!isNaN(until)&&until.getTime()<Date.now())return{ok:false,reason:'expired',until,trial:!!a.trial};
      return{ok:true,until,trial:!!a.trial}; }
    if(a.active===true)return{ok:true};
    return{ok:false,reason:'pending'};
  }catch(e){console.error('checkAccount',e);return{ok:false,reason:'error'};}
}

      return '<div class="adm-card'+(hasReq?' hot':'')+'"><b>'+esc(r.email)+'</b>'+(r.app?' <span class="adm-tag">'+esc(r.app)+'</span>':'')+'<div class="sm" style="color:'+s.c+'">'+s.t+'</div>'
        +'<div class="adm-btns"><button class="ok" onclick="adminGrant(\''+r.uid+'\',1)">+1th</button><button class="ok" onclick="adminGrant(\''+r.uid+'\',3)">+3th</button><button class="ok" onclick="adminGrant(\''+r.uid+'\',6)">+6th</button><button class="ok" onclick="adminGrant(\''+r.uid+'\',12)">+12th</button><button class="ok" onclick="adminActivate(\''+r.uid+'\',0)">Vĩnh viễn</button><button class="dng" onclick="adminLock(\''+r.uid+'\')">Khoá</button></div></div>';
    }).join('');
  }catch(e){console.error(e);box.innerHTML='<div style="padding:20px;color:#D9705F">Lỗi tải danh sách.</div>';}
};

  const until=new Date(base+months*30*86400000);
  await setDoc(doc(db,'accounts',uid),{active:true,trial:false,paidUntil:until},{merge:true});
  try{await setDoc(doc(db,'renewalRequests',uid),{status:'done',handledAt:serverTimestamp()},{merge:true});}catch(e){}
  cToast('✅ Đã gia hạn +'+months+' tháng'); window.loadAdminList();
}catch(e){cToast('❌ Lỗi, thử lại');} };

/* ============================ STORE (Firestore) ============================ */
/* Đường dẫn:
   - Singleton:  users/{uid}/cafe_config/{settings|meta}
   - Mảng:       users/{uid}/cafe_<col>/{itemId}
   Ghi theo delta từng document (setDoc/deleteDoc), KHÔNG await -> Firestore
   tự xếp hàng khi offline (giống mẫu writeBatch của Sổ Nợ). onSnapshot cho
   đồng bộ thời gian thực giữa nhiều thiết bị. */
const _shadow={};             // col -> Map(id -> json) trạng thái đã đồng bộ
const _dirty=new Set(); let _saveT=null;
let _unsubs=[]; let _ready=false;

function cpath(col){ return collection(db,'users',UID,(col==='settings'||col==='meta')?'cafe_config':'cafe_'+col); }
function dpathSingle(col){ return doc(db,'users',UID,'cafe_config',col); }
function jclone(o){ return JSON.parse(JSON.stringify(o)); }
function snapKey(o){ return JSON.stringify(o); }

function markDirty(col){ _dirty.add(col); clearTimeout(_saveT); _saveT=setTimeout(flush,350); }
async function flush(){
  if(!UID) return; const cols=[..._dirty]; _dirty.clear();
  for(const col of cols){ try{ await syncCol(col); }catch(e){ console.error('sync',col,e); } }
}
/* Field cộng dồn -> ghi bằng increment() để 2 máy bán cùng lúc không đè nhau */
const INC_FIELDS={ ingredients:['stock'], customers:['points','totalSpent','visits','debt'], products:['sold'], suppliers:['debt'] };
const INC_SINGLE={ meta:['orderSeq'] };
function incPayload(col,cur,prevObj){
  const payload=jclone(cur); const fs=INC_FIELDS[col]||[];
  for(const f of fs){ const b=Number(cur[f]); if(!isFinite(b)) continue;
    const a0=Number(prevObj?prevObj[f]:NaN);
    const a=isFinite(a0)?a0:(prevObj?0:NaN);   // doc đã biết nhưng field mới -> xem như 0 để cộng dồn đúng
    if(isFinite(a)&&a!==b) payload[f]=increment(b-a); }
  return payload;
}
async function syncCol(col){
  const state=ST.state; if(!state) return;
  if(SINGLE.includes(col)){
    const obj=state[col]||{}; let payload=jclone(obj);
    const fs=INC_SINGLE[col]||[]; let prevObj=null;
    try{ const p=(_shadow[col]||new Map()).get('_'); if(p) prevObj=JSON.parse(p); }catch(e){}
    for(const f of fs){ const b=Number(obj[f]); if(!isFinite(b)) continue;
      const a0=Number(prevObj?prevObj[f]:NaN); const a=isFinite(a0)?a0:(prevObj?0:NaN);
      if(isFinite(a)&&a!==b) payload[f]=increment(b-a); }
    setDoc(dpathSingle(col),payload,{merge:true}).catch(e=>console.error('setSingle',col,e));
    _shadow[col]=new Map([['_',snapKey(obj)]]); return;
  }
  const arr=state[col]||[]; const cur=new Map(); arr.forEach(it=>{ if(it&&it.id!=null) cur.set(String(it.id), it); });
  const prev=_shadow[col]||new Map();
  // thêm/sửa: doc đã có trên shadow -> merge + increment delta; doc mới -> set nguyên
  cur.forEach((it,id)=>{ const k=snapKey(it); const pk=prev.get(id);
    if(pk!==k){ let prevObj=null; if(pk){ try{prevObj=JSON.parse(pk);}catch(e){} }
      const payload = prevObj? incPayload(col,it,prevObj) : jclone(it);
      setDoc(doc(cpath(col),id),payload,{merge:!!prevObj}).catch(e=>console.error('set',col,id,e)); } });
  // xoá
  prev.forEach((_,id)=>{ if(!cur.has(id)){ deleteDoc(doc(cpath(col),id)).catch(e=>console.error('del',col,id,e)); } });
  const ns=new Map(); cur.forEach((it,id)=>ns.set(id,snapKey(it))); _shadow[col]=ns;
}

async function initialLoad(){
  const state = ST.freshSeed ? ST.freshSeed() : ST.seed();  // khởi tạo khung mặc định
  ST.state = state;
  // Singletons
  for(const col of SINGLE){
    try{ const s=await getDoc(dpathSingle(col)); if(s.exists()){ state[col]=Object.assign(state[col]||{}, s.data()); } }catch(e){}
  }
  // Arrays
  let hadAny=false;
  for(const col of ARRAYS){
    try{ const qs=await getDocs(cpath(col));
      if(!qs.empty){ hadAny=true; const arr=[]; qs.forEach(d=>arr.push(Object.assign({},d.data(),{id:d.id}))); state[col]=arr; }
      else { state[col]= state[col]||[]; }
    }catch(e){ console.error('load',col,e); state[col]=state[col]||[]; }
  }
  // Người dùng LẦN ĐẦU (chưa có settings trên cloud) -> đẩy seed lên
  let hasSettings=false; try{ const s=await getDoc(dpathSingle('settings')); hasSettings=s.exists(); }catch(e){}
  if(!hasSettings && !hadAny){ await seedToCloud(state); }
  // cập nhật shadow ban đầu
  for(const col of COLS){ rebuildShadow(col); }
}
function rebuildShadow(col){
  const state=ST.state;
  if(SINGLE.includes(col)){ _shadow[col]=new Map([['_',snapKey(state[col]||{})]]); return; }
  const m=new Map(); (state[col]||[]).forEach(it=>{ if(it&&it.id!=null) m.set(String(it.id),snapKey(it)); }); _shadow[col]=m;
}
async function seedToCloud(state){
  try{
    for(const col of SINGLE){ await setDoc(dpathSingle(col),jclone(state[col]||{}),{merge:true}); }
    for(const col of ARRAYS){ const arr=state[col]||[]; const b=writeBatch(db); let n=0;
      for(const it of arr){ if(it&&it.id!=null){ b.set(doc(cpath(col),String(it.id)),jclone(it)); n++; if(n%400===0){ await b.commit(); } } }
      try{ await b.commit(); }catch(e){}
    }
  }catch(e){ console.error('seedToCloud',e); }
}
function attachListeners(){
  detachAll();
  // Singletons
  SINGLE.forEach(col=>{ const un=onSnapshot(dpathSingle(col),snap=>{
    if(snap.metadata.hasPendingWrites) return;      // bỏ echo của chính mình
    if(snap.exists()){ ST.state[col]=Object.assign(ST.state[col]||{},snap.data()); rebuildShadow(col); if(_ready) reboot(); }
  },e=>console.error('snap',col,e)); _unsubs.push(un); });
  // Arrays
  ARRAYS.forEach(col=>{ const un=onSnapshot(cpath(col),snap=>{
    if(snap.metadata.hasPendingWrites) return;
    const arr=[]; snap.forEach(d=>arr.push(Object.assign({},d.data(),{id:d.id}))); ST.state[col]=arr; rebuildShadow(col); if(_ready) reboot();
  },e=>console.error('snap',col,e)); _unsubs.push(un); });
}
function detachAll(){ _unsubs.forEach(u=>{try{u();}catch(e){}}); _unsubs=[]; }
let _rebootT=null;
function reboot(){ clearTimeout(_rebootT); _rebootT=setTimeout(()=>{ try{ if(window.__cafeUI&&window.__cafeUI.refresh) window.__cafeUI.refresh(); }catch(e){} },120); }

/* STORE public (core.js gọi qua window.__STORE__) */
window.__STORE__ = {
  markDirty, flush,
  async load(){ if(!UID){ ST.state = ST.freshSeed?ST.freshSeed():ST.seed(); return; } await initialLoad(); attachListeners(); _ready=true; }
};

/* ============ Tự cập nhật an toàn (ETag/Last-Modified) + badge mạng ============ */
let _verTag=null,_updShown=false;
async function verCheck(){
  if(typeof location==='undefined' || !/^https?:/.test(location.protocol)) return;
  try{
    const r=await fetch(location.href,{method:'HEAD',cache:'no-store'});
    const t=(r.headers.get('etag')||'')+'|'+(r.headers.get('last-modified')||'');
    if(t==='|') return;
    if(_verTag===null){ _verTag=t; return; }
    if(t!==_verTag && !_updShown){ _updShown=true; showUpdateBar(); }
  }catch(e){}
}
function showUpdateBar(){
  if($('upd-bar')) return;
  const d=document.createElement('div'); d.id='upd-bar';
  d.style.cssText='position:fixed;left:12px;right:12px;bottom:14px;z-index:99;background:linear-gradient(135deg,#C9A24B,#9C7A2E);color:#1a1204;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.5)';
  d.innerHTML='<span style="flex:1">🆕 Có phiên bản mới của app</span><button style="border:none;background:#1a1204;color:#E4C878;border-radius:9px;padding:8px 12px;font-weight:800" onclick="(async()=>{try{await (window.__TS__&&window.__TS__.flush&&window.__TS__.flush());}catch(e){};location.reload();})()">Cập nhật</button><button style="border:none;background:transparent;color:#1a1204;font-size:18px;cursor:pointer" onclick="this.parentElement.remove()">×</button>';
  document.body.appendChild(d);
}
if(typeof location!=='undefined' && /^https?:/.test(location.protocol)){
  setInterval(verCheck, 10*60*1000);
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) verCheck(); });
  setTimeout(verCheck, 4000);
}
function netBadge(){ const b=$('syncBadge'); if(!b) return; const on=(typeof navigator!=='undefined'&&navigator.onLine===false)?false:true;
  b.innerHTML='<span class="dot'+(on?' on':'')+'"></span> '+(on?'Đám mây':'Offline · sẽ tự đồng bộ'); }
window.addEventListener('online',netBadge); window.addEventListener('offline',netBadge);

onAuthStateChanged(auth, async user=>{
  if(user){
    UID=user.uid; window.__CAFE_UID__=UID;
    await loadBilling();
    let acc=await checkAccount(user.uid);
    if(!acc.ok && acc.reason==='pending' && !isAdmin()){ const ok=await tryStartTrial(user.uid); if(ok)acc=await checkAccount(user.uid); }
    if(!acc.ok){ showScreen('locked'); renderLocked(acc,user); return; }
    // ĐƯỢC PHÉP DÙNG -> nạp dữ liệu cafe rồi hiện app + cổng nhân viên
    _ready=false;
    await window.__STORE__.load();
    showScreen('app');
    netBadge();
    const ab=$('admin-btn'); if(ab) ab.style.display=acc.admin?'':'none';
    showExpiryBanner(acc);
    // render cổng PIN nhân viên với dữ liệu đã tải
    try{ if(window.__cafeUI&&window.__cafeUI.renderPin) window.__cafeUI.renderPin(); }catch(e){}
  } else {
    UID=null; window.__CAFE_UID__=null; detachAll(); _ready=false;
    try{ if(window.__cafeUI&&window.__cafeUI.relock) window.__cafeUI.relock(); }catch(e){}
    showScreen('auth');
  }
});
