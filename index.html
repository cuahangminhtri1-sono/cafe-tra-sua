let BILLING=null, UID=null;
const ST = window.__TS__;                 // cầu nối lõi (core.js)
const COLS = ST.COLLECTIONS;
const SINGLE = ['settings','meta'];        // lưu dạng 1 document
const ARRAYS = COLS.filter(c=>!SINGLE.includes(c));

const $ = (s)=>document.getElementById(s);
function fmt(n){return Number(n||0).toLocaleString('vi-VN')+'đ';}
function fmtDateRaw(ts){ if(!ts)return''; const d=ts.toDate?ts.toDate():new Date(ts); return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear(); }
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isAdmin(){return auth.currentUser && (auth.currentUser.email||'').toLowerCase()===ADMIN_EMAIL;}

/* ═════════ GIẤY PHÉP RIÊNG TỪNG APP ═════════
   Kho Cafe đều mang tiền tố cafe_ (xem cpath) ⇒ Firestore Rules map về app 'cafe'. */
const MA_APP = 'cafe';
const licRef = (uid, app) => doc(db,'accounts',uid,'lic',app);
let   LICMAP = {};

/* ═══════════ [VÁ v2.1] BỘ CÔNG CỤ GIA HẠN THỐNG NHẤT ═══════════
   Sửa: khoá/mở khoá khách cũ · duyệt đúng app · giá riêng từng app ·
   chống bấm đúp · hiện mã lỗi · sổ doanh thu. */
const _DOC=(...a)=>doc(db,...a), _COLL=(...a)=>collection(db,...a), _CG=(n)=>collectionGroup(db,n),
      _SET=setDoc, _GET=getDoc, _GETS=getDocs, _ADD=addDoc, _DEL=deleteDoc, _SRV=serverTimestamp;
async function _ask(m){ return window.confirm(m); }
const APP_IDS=['sono','sono_pos','tro','cafe'];
const APP_TEN={sono:'Sổ Nợ',sono_pos:'Bán hàng (POS)',tro:'TrọSafe',cafe:'Cafe'};
const MY_APPS=['cafe'];
let _REQS=[], _EMAILS={}, _admBusy=false;
function _esc2(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function _vnd(n){return Number(n||0).toLocaleString('vi-VN')+'đ';}
function _dts(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);if(isNaN(d))return'';return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function _ms(ts){if(!ts)return 0;if(typeof ts==='number')return ts;if(ts.toMillis)return ts.toMillis();const d=ts.toDate?ts.toDate():new Date(ts);return isNaN(d)?0:d.getTime();}
function _ec(e){return String((e&&(e.code||e.message))||'lỗi không rõ');}
function _permHint(e){return (e&&e.code==='permission-denied')?' — Firestore Rules CHƯA cập nhật, hãy dán firestore.rules mới (xem Báo cáo).':'';}
function priceFor(app){var B=BILLING||{};
  if(app==='sono')return (B.priceSono>0?B.priceSono:(B.pricePerMonth>0?B.pricePerMonth:10000));
  if(app==='sono_pos')return (B.pricePos>0?B.pricePos:(B.posPricePerMonth>0?B.posPricePerMonth:0));
  if(app==='tro')return (B.priceTro>0?B.priceTro:(B.price>0?B.price:50000));
  if(app==='cafe')return (B.priceCafe>0?B.priceCafe:(B.pricePerMonth>0?B.pricePerMonth:10000));
  return 0;}
function _admStat(L,a){
  /* Trạng thái khách (tự chứa — không phụ thuộc hàm riêng của từng app). */
  function one(d,sfx){
    if(!d)return null;
    if(d.active===false)return{t:'🔒 Đã khoá'+sfx,c:'#D9705F'};
    if(d.paidUntil){
      var u=(d.paidUntil&&d.paidUntil.toDate)?d.paidUntil.toDate():new Date(d.paidUntil);
      if(isNaN(u))return null;
      if(u.getTime()<Date.now())return{t:'⛔ Hết hạn '+_dts(u)+sfx,c:'#D9705F'};
      if(d.trial)return{t:'🎁 Dùng thử tới '+_dts(u)+sfx,c:'#E0C079'};
      return{t:'✅ Còn hạn tới '+_dts(u)+sfx,c:'#6FCBAC'};
    }
    if(d.active===true)return{t:'✅ Đang dùng (vĩnh viễn)'+sfx,c:'#6FCBAC'};
    return null;
  }
  var r=one(L,'');if(r)return r;
  if(!a)return{t:'⏳ Chờ kích hoạt',c:'#E0C079'};
  if(a.migrated===true)return{t:'⏳ Chưa mua gói',c:'#E0C079'};
  if('paidUntil' in a){var r2=one(a,' · cũ');if(r2)return r2;}
  return{t:'⏳ Chờ kích hoạt',c:'#E0C079'};
}
function normReq(id,x){x=x||{};var uid=x.uid,app=x.app||'';
  if(id.indexOf('__')>-1){var p=id.split('__');uid=uid||p[0];app=app||p[1]||'';}else{uid=uid||id;}
  if(APP_IDS.indexOf(app)===-1)app='';
  return {reqId:id,uid:uid,app:app,months:Number(x.months)||1,amount:Number(x.amount)||0,email:x.email||''};}
function _pendingFor(uid,app){for(var i=0;i<_REQS.length;i++){var q=_REQS[i];
  if(q.uid===uid&&(q.app===app||(q.app===''&&app===MA_APP)))return q.reqId;}return '';}
async function markReqDone(reqId){ if(!reqId)return;
  try{ await _SET(_DOC('renewalRequests',reqId),{status:'done',handledAt:_SRV()},{merge:true}); }catch(e){} }
window.adminGrantApp=async function(uid,months,app,reqId){
  if(_admBusy)return; _admBusy=true;
  try{
    months=[1,3,6,12].indexOf(Number(months))>-1?Number(months):1;
    app=APP_IDS.indexOf(app)>-1?app:MA_APP;
    if(!reqId)reqId=_pendingFor(uid,app);
    var base=Date.now();
    var snap=await _GET(licRef(uid,app));
    if(snap.exists()){var a=snap.data();
      if(a.paidUntil){var u=a.paidUntil.toDate?a.paidUntil.toDate():new Date(a.paidUntil);
        if(!isNaN(u)&&u.getTime()>base)base=u.getTime();}}
    else{ try{var s0=await _GET(_DOC('accounts',uid));
      if(s0.exists()){var a0=s0.data();var lg=(app==='sono_pos')?a0.posUntil:a0.paidUntil;
        if(a0.migrated!==true&&lg){var u0=lg.toDate?lg.toDate():new Date(lg);
          if(!isNaN(u0)&&u0.getTime()>base)base=u0.getTime();}}
    }catch(e){} }
    var until=new Date(base+months*30*86400000);
    await _SET(licRef(uid,app),{active:true,trial:false,trialUsed:true,paidUntil:until,updatedAt:_SRV(),updatedBy:'admin'},{merge:true});
    await markReqDone(reqId);
    try{ await _ADD(_COLL('payments'),{uid:uid,email:_EMAILS[uid]||'',app:app,months:months,amount:priceFor(app)*months,at:_SRV(),src:reqId?'duyet':'tay'}); }catch(e){}
    cToast('✅ Đã gia hạn '+(APP_TEN[app]||app)+' +'+months+' tháng · hạn mới: '+_dts(until));
    window.loadAdminList();
  }catch(e){ console.error('grant',e); cToast('❌ Không gia hạn được ['+_ec(e)+']'+_permHint(e)); }
  finally{ _admBusy=false; }
};
window.adminUnlockApp=async function(uid,app){
  if(_admBusy)return; _admBusy=true;
  try{ app=APP_IDS.indexOf(app)>-1?app:MA_APP;
    var snap=await _GET(licRef(uid,app)); var d=snap.exists()?snap.data():null;
    if(d && !('paidUntil' in d) && d.trialUsed!==true){ await _DEL(licRef(uid,app)); }
    else{ await _SET(licRef(uid,app),{active:true,updatedAt:_SRV()},{merge:true}); }
    cToast('🔓 Đã mở khoá'); window.loadAdminList();
  }catch(e){ console.error(e); cToast('❌ Không mở khoá được ['+_ec(e)+']'+_permHint(e)); }
  finally{ _admBusy=false; }
};
window.adminUnlock=function(uid){ return window.adminUnlockApp(uid,MA_APP); };
window.loadAdminList=async function(){
  const box=$('admin-list'); if(!box)return;
  box.innerHTML='<div style="padding:20px;text-align:center;color:#9DB3AA">Đang tải...</div>';
  try{
    const r=await Promise.all([_GETS(_COLL('signups')),_GETS(_COLL('accounts')),
      _GETS(_COLL('renewalRequests')).catch(()=>({forEach:()=>{}})),
      _GETS(_CG('lic')).catch(()=>({forEach:()=>{}}))]);
    const sg=r[0],ac=r[1],rq=r[2],lc=r[3];
    const accMap={};ac.forEach(d=>accMap[d.id]=d.data());
    LICMAP={};lc.forEach(d=>{try{const u=d.ref.parent.parent.id;(LICMAP[u]=LICMAP[u]||{})[d.id]=d.data();}catch(e){}});
    _REQS=[];rq.forEach(d=>{const x=d.data();if(!x||x.status==='done')return;_REQS.push(normReq(d.id,x));});
    const rows=[];sg.forEach(d=>rows.push({uid:d.id,email:d.data().email||'(không rõ email)',created:d.data().createdAt}));
    rows.sort((a,b)=>_ms(b.created)-_ms(a.created));
    _EMAILS={};rows.forEach(r2=>_EMAILS[r2.uid]=r2.email);
    let reqHtml='';
    if(_REQS.length){
      reqHtml='<div style="background:rgba(224,192,121,.10);border:1.5px solid rgba(224,192,121,.55);border-radius:12px;padding:12px 14px;margin:0 0 14px">'
        +'<div style="font-weight:700;color:#E0C079;margin-bottom:8px">📥 Yêu cầu gia hạn đang chờ ('+_REQS.length+')</div>'
        +_REQS.map(q=>{
          const em=q.email||_EMAILS[q.uid]||q.uid;
          const tenApp=q.app?(APP_TEN[q.app]||q.app):('❓ gói cũ → sẽ duyệt vào '+APP_TEN[MA_APP]);
          const target=q.app||MA_APP;
          const exp=priceFor(target)*q.months;
          let money='khách ghi <b>'+_vnd(q.amount)+'</b>';
          if(exp>0){ money+=(Math.abs(exp-q.amount)>0
            ?' · <b style="color:#D9705F">⚠️ giá đúng '+_vnd(exp)+'</b>'
            :' · <span style="color:#6FCBAC">khớp giá ✓</span>'); }
          return '<div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:10px 12px;margin:8px 0">'
            +'<div style="font-weight:600;word-break:break-all;color:#EDE7DA">'+_esc2(em)+'</div>'
            +'<div style="font-size:.85em;color:#E0C079;margin:3px 0 8px">Xin <b>'+tenApp+'</b> · <b>'+q.months+' tháng</b> · '+money+'</div>'
            +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
            +'<button onclick="adminGrantApp(\''+q.uid+'\','+q.months+',\''+target+'\',\''+q.reqId+'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#2d9e5f;color:#fff">✅ Duyệt '+(APP_TEN[target]||target)+' +'+q.months+'th</button>'
            +'<button onclick="adminDismissReq(\''+q.reqId+'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:#EDE7DA">Ẩn</button>'
            +'</div></div>';}).join('')
        +'</div>';
    }
    if(!rows.length){box.innerHTML=reqHtml+'<div style="padding:20px;text-align:center;color:#9DB3AA">Chưa có khách nào đăng ký.</div>';return;}
    box.innerHTML=reqHtml+rows.map(r2=>{
      const L=(LICMAP[r2.uid]||{})[MA_APP];
      const s=_admStat(L,accMap[r2.uid]);
      const locked=!!(L&&L.active===false);
      const myReq=_pendingFor(r2.uid,MA_APP);
      return '<div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 14px;margin:10px 0'+(myReq?';box-shadow:0 0 0 2px rgba(224,192,121,.55)':'')+'">'
        +'<div style="font-weight:600;word-break:break-all;color:#EDE7DA">'+_esc2(r2.email)+(myReq?' <span style="color:#E0C079;font-size:.8em">📥 đang xin gia hạn</span>':'')+'</div>'
        +'<div style="font-size:.85em;color:'+s.c+';margin:4px 0 10px">'+s.t+'</div>'
        +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
        +'<button onclick="adminGrantApp(\''+r2.uid+'\',1,\''+MA_APP+'\',\'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#2d9e5f;color:#fff">+1 tháng</button>'
        +'<button onclick="adminGrantApp(\''+r2.uid+'\',3,\''+MA_APP+'\',\'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#268a72;color:#fff">+3</button>'
        +'<button onclick="adminGrantApp(\''+r2.uid+'\',6,\''+MA_APP+'\',\'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#1f7a86;color:#fff">+6</button>'
        +'<button onclick="adminGrantApp(\''+r2.uid+'\',12,\''+MA_APP+'\',\'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#1c6f9e;color:#fff">+12</button>'
        +'<button onclick="adminActivate(\''+r2.uid+'\',0)" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#1a6b3c;color:#fff">Vĩnh viễn</button>'
        +(locked
          ?'<button onclick="adminUnlock(\''+r2.uid+'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#7a5a00;color:#fff">🔓 Mở khoá</button>'
          :'<button onclick="adminLock(\''+r2.uid+'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#c0392b;color:#fff">Khoá</button>')
        +'</div></div>';
    }).join('');
  }catch(e){console.error(e);box.innerHTML='<div style="padding:20px;color:#D9705F">Lỗi tải danh sách ['+_ec(e)+']'+_permHint(e)+'</div>';}
};
window.adminActivate=async function(uid,days){
  if(_admBusy)return;
  if(!days){ if(!(await _ask('Cấp VĨNH VIỄN cho khách này? (không còn hạn sử dụng)')))return; }
  _admBusy=true;
  try{
    const data={active:true,trial:false,trialUsed:true,updatedAt:_SRV(),updatedBy:'admin'};
    data.paidUntil = days>0 ? new Date(Date.now()+days*86400000) : null;
    await _SET(licRef(uid,MA_APP),data,{merge:true});
    await markReqDone(_pendingFor(uid,MA_APP));
    try{ await _ADD(_COLL('payments'),{uid:uid,email:_EMAILS[uid]||'',app:MA_APP,months:0,amount:0,note:days>0?(days+' ngày'):'vĩnh viễn',at:_SRV(),src:'tay'}); }catch(e){}
    cToast('✅ Đã bật'+(days>0?(' '+days+' ngày'):' VĨNH VIỄN'));
    window.loadAdminList();
  }catch(e){console.error(e);cToast('❌ Không bật được ['+_ec(e)+']'+_permHint(e));}
  finally{_admBusy=false;}
};
window.adminLock=async function(uid){
  if(_admBusy)return;
  if(!(await _ask('Khoá tài khoản '+( _EMAILS[uid]||uid )+' ở '+APP_TEN[MA_APP]+'?')))return;
  _admBusy=true;
  try{await _SET(licRef(uid,MA_APP),{active:false,updatedAt:_SRV(),updatedBy:'admin'},{merge:true});cToast('🔒 Đã khoá');window.loadAdminList();}
  catch(e){console.error(e);cToast('❌ Không khoá được ['+_ec(e)+']'+_permHint(e));}
  finally{_admBusy=false;}
};
window.adminGrantMonths=function(uid,months){ return window.adminGrantApp(uid,months,MA_APP,''); };
window.adminGrant=window.adminGrantMonths;
window.adminDismissReq=async function(reqId){
  try{ await _SET(_DOC('renewalRequests',reqId),{status:'done',handledAt:_SRV()},{merge:true}); cToast('✅ Đã ẩn yêu cầu'); window.loadAdminList(); }
  catch(e){console.error(e);cToast('❌ Không ẩn được ['+_ec(e)+']'+_permHint(e));}
};
window.adminDismiss=window.adminDismissReq;
window.loadRevenue=async function(){
  const box=$('admin-list'); if(!box)return;
  box.innerHTML='<div style="padding:20px;text-align:center;color:#9DB3AA">Đang tải doanh thu...</div>';
  try{
    const ss=await _GETS(_COLL('payments'));
    const rows=[]; ss.forEach(d=>{const x=d.data()||{}; if(MY_APPS.indexOf(x.app)===-1)return; rows.push(x);});
    rows.sort((a,b)=>_ms(b.at)-_ms(a.at));
    const now=new Date(); const m0=new Date(now.getFullYear(),now.getMonth(),1).getTime();
    let sumAll=0,sumM=0,nM=0;
    rows.forEach(x=>{const v=Number(x.amount)||0;sumAll+=v;if(_ms(x.at)>=m0){sumM+=v;nM++;}});
    let h='<button onclick="loadAdminList()" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:#EDE7DA;margin-bottom:12px">← Về danh sách khách</button>'
      +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">'
      +'<div style="flex:1;min-width:150px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 14px"><div style="font-size:.8em;color:#9DB3AA">Tháng này ('+nM+' lượt)</div><div style="font-weight:800;font-size:1.25em;color:#6FCBAC">'+_vnd(sumM)+'</div></div>'
      +'<div style="flex:1;min-width:150px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 14px"><div style="font-size:.8em;color:#9DB3AA">Tổng cộng ('+rows.length+' lượt)</div><div style="font-weight:800;font-size:1.25em;color:#EDE7DA">'+_vnd(sumAll)+'</div></div></div>';
    if(!rows.length)h+='<div style="padding:20px;text-align:center;color:#9DB3AA">Chưa có khoản thu nào (mỗi lần bấm gia hạn/duyệt sẽ tự ghi vào đây).</div>';
    else h+=rows.slice(0,30).map(x=>'<div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:9px 12px;margin:7px 0;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;color:#EDE7DA">'
      +'<span style="word-break:break-all">'+_dts(x.at)+' · <b>'+_esc2(x.email||x.uid||'')+'</b> · '+(APP_TEN[x.app]||x.app)+(x.months?(' +'+x.months+'th'):(' '+_esc2(x.note||'')))+(x.src==='duyet'?' · 📥':'')+'</span>'

function _hanInfo(d){
  if(!d)return null;
  if(d.active===false)return{ok:false,reason:'locked'};
  if(d.paidUntil){ const until=d.paidUntil.toDate?d.paidUntil.toDate():new Date(d.paidUntil);
    if(!isNaN(until)&&until.getTime()<Date.now())return{ok:false,reason:'expired',until,trial:!!d.trial};
    return{ok:true,until,trial:!!d.trial}; }
  if(d.active===true)return{ok:true};   // paidUntil rỗng = admin cấp VĨNH VIỄN
  return null;
}
async function checkAccount(uid){
  try{
    if(isAdmin())return{ok:true,admin:true};

    // ① GIẤY PHÉP RIÊNG CỦA APP NÀY — accounts/{uid}/lic/cafe
    try{
      const L=await getDoc(licRef(uid,MA_APP));
      if(L.exists()){ const r=_hanInfo(L.data()); if(r)return r; }
    }catch(e){console.warn('đọc lic lỗi:',e&&e.code);}

    // ② TƯƠNG THÍCH KHÁCH CŨ — CHỈ khi doc gốc THẬT SỰ mang paidUntil kiểu cũ.
    //    (Doc gốc kiểu MỚI không có paidUntil ⇒ TUYỆT ĐỐI không được coi là "vĩnh viễn".)
    const snap=await getDoc(doc(db,'accounts',uid));
    if(!snap.exists())return{ok:false,reason:'pending'};
    const a=snap.data();
    if(a.migrated===true)return{ok:false,reason:'pending'};
    if(!('paidUntil' in a))return{ok:false,reason:'pending'};
    const r=_hanInfo(a);
    return r||{ok:false,reason:'pending'};
  }catch(e){console.error('checkAccount',e);return{ok:false,reason:'error'};}
}

/* ============================ STORE (Firestore) ============================ */
/* Đường dẫn:
   - Singleton:  users/{uid}/cafe_config/{settings|meta}
   - Mảng:       users/{uid}/cafe_<col>/{itemId}
   Ghi theo delta từng document (setDoc/deleteDoc), KHÔNG await -> Firestore
   tự xếp hàng khi offline (giống mẫu writeBatch của Sổ Nợ). onSnapshot cho
   đồng bộ thời gian thực giữa nhiều thiết bị. */
const _shadow={};             // col -> Map(id -> json) trạng thái đã đồng bộ
const _dirty=new Set(); let _saveT=null;
let _unsubs=[]; let _ready=false;

/* ══════════════════════════════════════════════════════════════════
   TẢI THEO CỬA SỔ THỜI GIAN  (chống "bom chi phí" Firestore)
   - Kho GỐC (thực đơn, bàn, khách, nhân viên, kho NL...): tải đủ — nhỏ, cố định.
   - Kho NẶNG (đơn, xuất-nhập kho, thu chi, ca): CHỈ tải ít ngày gần nhất
     + các bản ghi CÒN MỞ (đơn đang phục vụ, ca chưa chốt).
   - Lịch sử cũ: chỉ tải khi khách bấm xem (đổi bộ lọc ngày).
   ══════════════════════════════════════════════════════════════════ */
const HEAVY   = { orders:'ts', stockMovements:'ts', cashbook:'ts', shifts:'openTs' };
const HCOLS   = Object.keys(HEAVY);
const LIGHT   = ARRAYS.filter(c=>!HEAVY[c]);
const WINDOW  = { orders:3, stockMovements:1, cashbook:3, shifts:14 };   // số ngày tải lúc mở app
const OPENQ   = { orders:'open', shifts:'open' };                         // còn mở -> luôn tải dù cũ
const DAY     = 86400000;

const _parts={};        // col -> {win:Map, open:Map, extra:Map}
const _loadedFrom={};   // col -> mốc thời gian sớm nhất đã có
const _liveFrom={};     // col -> mốc của listener realtime

function cpath(col){ return collection(db,'users',UID,(col==='settings'||col==='meta')?'cafe_config':'cafe_'+col); }
function dpathSingle(col){ return doc(db,'users',UID,'cafe_config',col); }
function jclone(o){ return JSON.parse(JSON.stringify(o)); }
function snapKey(o){ return JSON.stringify(o); }
function docsOf(qs){ const a=[]; qs.forEach(d=>a.push(Object.assign({},d.data(),{id:d.id}))); return a; }
function toMap(arr){ const m=new Map(); arr.forEach(x=>{ if(x&&x.id!=null) m.set(String(x.id),x); }); return m; }

function rebuildHeavy(col){
  const p=_parts[col]||{}; const m=new Map();
  ['extra','win','open'].forEach(k=>{ if(p[k]) p[k].forEach((v,id)=>m.set(id,v)); });
  ST.state[col]=Array.from(m.values());
  rebuildShadow(col);
}

/* Ghi: field cộng dồn -> increment() để 2 máy không đè nhau */
const INC_FIELDS={ ingredients:['stock'], customers:['points','totalSpent','visits','debt'], products:['sold'], suppliers:['debt'] };
const INC_SINGLE={ meta:['orderSeq'] };
function incPayload(col,cur,prevObj){
  const payload=jclone(cur); const fs=INC_FIELDS[col]||[];
  for(const f of fs){ const b=Number(cur[f]); if(!isFinite(b)) continue;
    const a0=Number(prevObj?prevObj[f]:NaN);
    const a=isFinite(a0)?a0:(prevObj?0:NaN);
    if(isFinite(a)&&a!==b) payload[f]=increment(b-a); }
  return payload;
}

function markDirty(col){ _dirty.add(col); clearTimeout(_saveT); _saveT=setTimeout(flush,350); }
async function flush(){
  if(!UID) return; const cols=[..._dirty]; _dirty.clear();
  for(const col of cols){ try{ await syncCol(col); }catch(e){ console.error('sync',col,e); } }
}
/* Rule mới chặn ghi khi HẾT HẠN -> báo cho khách biết, không im lặng nuốt lỗi */
let _denied=false;
function wErr(e){
  if(e && (e.code==='permission-denied' || /permission/i.test(e.message||''))){
    if(_denied) return; _denied=true;
    try{ if(window.__cafeUI&&window.__cafeUI.toast) window.__cafeUI.toast('⛔ Tài khoản hết hạn — không lưu được. Vui lòng gia hạn.'); }catch(x){}
    setTimeout(async()=>{ try{ const acc=await checkAccount(UID); if(!acc.ok){ detachAll(); showScreen('locked'); renderLocked(acc, auth.currentUser); } }catch(x){} }, 400);
  } else console.error('write', e);
}
async function syncCol(col){
  const state=ST.state; if(!state) return;
  if(SINGLE.includes(col)){
    const obj=state[col]||{}; let payload=jclone(obj);
    const fs=INC_SINGLE[col]||[]; let prevObj=null;
    try{ const p=(_shadow[col]||new Map()).get('_'); if(p) prevObj=JSON.parse(p); }catch(e){}
    for(const f of fs){ const b=Number(obj[f]); if(!isFinite(b)) continue;
      const a0=Number(prevObj?prevObj[f]:NaN); const a=isFinite(a0)?a0:(prevObj?0:NaN);
      if(isFinite(a)&&a!==b) payload[f]=increment(b-a); }
    setDoc(dpathSingle(col),payload,{merge:true}).catch(wErr);
    _shadow[col]=new Map([['_',snapKey(obj)]]); return;
  }
  const arr=state[col]||[]; const cur=new Map(); arr.forEach(it=>{ if(it&&it.id!=null) cur.set(String(it.id), it); });
  const prev=_shadow[col]||new Map();
  cur.forEach((it,id)=>{ const k=snapKey(it); const pk=prev.get(id);
    if(pk!==k){ let prevObj=null; if(pk){ try{prevObj=JSON.parse(pk);}catch(e){} }
      const payload = prevObj? incPayload(col,it,prevObj) : jclone(it);
      setDoc(doc(cpath(col),id),payload,{merge:!!prevObj}).catch(wErr); } });
  prev.forEach((_,id)=>{ if(!cur.has(id)){ deleteDoc(doc(cpath(col),id)).catch(wErr); } });
  const ns=new Map(); cur.forEach((it,id)=>ns.set(id,snapKey(it))); _shadow[col]=ns;
}

async function initialLoad(){
  const state = ST.freshSeed ? ST.freshSeed() : ST.seed();
  ST.state = state;
  for(const col of SINGLE){
    try{ const s=await getDoc(dpathSingle(col)); if(s.exists()){ state[col]=Object.assign(state[col]||{}, s.data()); } }catch(e){}
  }
  let hadAny=false;
  /* --- kho GỐC: tải đủ (nhỏ) --- */
  for(const col of LIGHT){
    try{ const qs=await getDocs(cpath(col));
      if(!qs.empty){ hadAny=true; state[col]=docsOf(qs); } else state[col]=state[col]||[];
    }catch(e){ console.error('load',col,e); state[col]=state[col]||[]; }
  }
  /* --- kho NẶNG: chỉ cửa sổ gần nhất + bản ghi còn mở --- */
  for(const col of HCOLS){
    const tf=HEAVY[col], from=Date.now()-(WINDOW[col]||3)*DAY;
    _liveFrom[col]=from; _loadedFrom[col]=from;
    _parts[col]={win:new Map(),open:new Map(),extra:new Map()};
    try{
      const qs=await getDocs(query(cpath(col), where(tf,'>=',from)));
      _parts[col].win=toMap(docsOf(qs));
      if(!qs.empty) hadAny=true;
    }catch(e){ console.error('load-win',col,e); }
    if(OPENQ[col]){
      try{ const qo=await getDocs(query(cpath(col), where('status','==',OPENQ[col])));
        _parts[col].open=toMap(docsOf(qo));
      }catch(e){ console.error('load-open',col,e); }
    }
    rebuildHeavy(col);
  }
  let hasSettings=false; try{ const s=await getDoc(dpathSingle('settings')); hasSettings=s.exists(); }catch(e){}
  if(!hasSettings && !hadAny){ await seedToCloud(state); }

  /* ── CỨU HỘ CỔNG PIN ─────────────────────────────────────────────────────
     Ca thật đã gặp: đám mây CÓ settings nhưng kho cafe_staff RỖNG (seed lần trước
     hỏng dở) -> onSnapshot xoá sạch state.staff -> nhập PIN nào cũng "sai".
     Phải kiểm ĐÁM MÂY, không được chỉ kiểm bộ nhớ (bộ nhớ vẫn còn seed nên không rỗng). */
  let mayRongStaff=true;
  try{ const qs=await getDocs(cpath('staff')); mayRongStaff=qs.empty; }catch(e){}

  if(!Array.isArray(state.staff) || state.staff.filter(s=>s&&s.active).length===0){
    const seedStaff=(ST.seed?(ST.seed().staff||null):null);
    state.staff = (seedStaff&&seedStaff.length) ? seedStaff : [
      {id:'u_owner',   name:'Chủ quán',   pin:'1234', role:'owner',   active:true},
      {id:'u_cashier', name:'Thu ngân A', pin:'1111', role:'cashier', active:true}
    ];
  }
  if(mayRongStaff && state.staff.length){
    try{
      const b=writeBatch(db);
      for(const it of state.staff){ if(it&&it.id!=null) b.set(doc(cpath('staff'),String(it.id)),jclone(it)); }
      await b.commit();
      console.warn('[CỨU HỘ] cafe_staff trên đám mây RỖNG — đã đẩy lại nhân viên. Chủ quán PIN 1234');
    }catch(e){ console.error('cuu-ho-staff',e); }
  }

  for(const col of SINGLE.concat(LIGHT)){ rebuildShadow(col); }
}
function rebuildShadow(col){
  const state=ST.state;
  if(SINGLE.includes(col)){ _shadow[col]=new Map([['_',snapKey(state[col]||{})]]); return; }
  const m=new Map(); (state[col]||[]).forEach(it=>{ if(it&&it.id!=null) m.set(String(it.id),snapKey(it)); }); _shadow[col]=m;
}
async function seedToCloud(state){
  /* THỨ TỰ QUAN TRỌNG: seed STAFF TRƯỚC, SETTINGS SAU CÙNG.
     Vì lần khởi động sau chỉ kiểm tra `hasSettings` — nếu settings ghi xong mà staff
     hỏng dở thì lần sau KHÔNG seed lại nữa -> cổng PIN chết vĩnh viễn.
     Ghi settings sau cùng ⇒ settings chỉ tồn tại khi staff đã có. */
  const thuTu=['staff'].concat(ARRAYS.filter(c=>c!=='staff'));
  for(const col of thuTu){
    const arr=state[col]||[]; if(!arr.length) continue;
    try{
      let b=writeBatch(db); let n=0;
      for(const it of arr){ if(it&&it.id!=null){ b.set(doc(cpath(col),String(it.id)),jclone(it)); n++;
        if(n%400===0){ await b.commit(); b=writeBatch(db); } } }   /* batch đã commit KHÔNG dùng lại được -> tạo batch mới */
      await b.commit();
    }catch(e){ console.error('seedToCloud',col,e); }
  }
  for(const col of SINGLE){
    try{ await setDoc(dpathSingle(col),jclone(state[col]||{}),{merge:true}); }
    catch(e){ console.error('seedToCloud',col,e); }
  }
}

function attachListeners(){
  detachAll();
  SINGLE.forEach(col=>{ const un=onSnapshot(dpathSingle(col),snap=>{
    if(snap.metadata.hasPendingWrites) return;
    if(snap.exists()){ ST.state[col]=Object.assign(ST.state[col]||{},snap.data()); rebuildShadow(col); if(_ready) reboot(); }
  },e=>console.error('snap',col,e)); _unsubs.push(un); });

  LIGHT.forEach(col=>{ const un=onSnapshot(cpath(col),snap=>{
    if(snap.metadata.hasPendingWrites) return;
    const rows=docsOf(snap);
    /* ⛔ KHÔNG cho ảnh chụp RỖNG xoá sạch NHÂN VIÊN trong bộ nhớ.
       Đây chính là gốc của lỗi "nhập PIN nào cũng sai": kho cafe_staff trên đám mây
       rỗng -> onSnapshot ghi đè state.staff = [] -> không còn ai để so PIN.
       Thay vì xoá, ta ĐẨY NGƯỢC danh sách đang có lên đám mây. */
    if(col==='staff' && rows.length===0){
      const cur=(ST.state&&ST.state.staff)||[];
      if(cur.length){ _shadow['staff']=new Map(); try{ markDirty('staff'); }catch(e){} return; }
    }
    ST.state[col]=rows; rebuildShadow(col); if(_ready) reboot();
  },e=>console.error('snap',col,e)); _unsubs.push(un); });

  /* Kho nặng: chỉ nghe realtime trong cửa sổ + bản ghi còn mở -> rẻ mà vẫn đồng bộ tức thời */
  HCOLS.forEach(col=>{
    const tf=HEAVY[col];
    const u1=onSnapshot(query(cpath(col), where(tf,'>=',_liveFrom[col])), snap=>{
      if(snap.metadata.hasPendingWrites) return;
      _parts[col].win=toMap(docsOf(snap)); rebuildHeavy(col); if(_ready) reboot();
    }, e=>console.error('snap-win',col,e));
    _unsubs.push(u1);
    if(OPENQ[col]){
      const u2=onSnapshot(query(cpath(col), where('status','==',OPENQ[col])), snap=>{
        if(snap.metadata.hasPendingWrites) return;
        _parts[col].open=toMap(docsOf(snap)); rebuildHeavy(col); if(_ready) reboot();
      }, e=>console.error('snap-open',col,e));
      _unsubs.push(u2);
    }
  });
}
function detachAll(){ _unsubs.forEach(u=>{try{u();}catch(e){}}); _unsubs=[]; }
let _rebootT=null;
function reboot(){ clearTimeout(_rebootT); _rebootT=setTimeout(()=>{ try{ if(window.__cafeUI&&window.__cafeUI.refresh) window.__cafeUI.refresh(); }catch(e){} },120); }

/* ---- TẢI THÊM LỊCH SỬ KHI KHÁCH BẤM XEM ---- */
async function loadOlder(col, from, to){
  const tf=HEAVY[col];
  const qs=await getDocs(query(cpath(col), where(tf,'>=',from), where(tf,'<',to)));
  const p=_parts[col]; docsOf(qs).forEach(d=>p.extra.set(String(d.id),d));
  _loadedFrom[col]=from; rebuildHeavy(col);
}
async function ensureRange(from){
  if(!UID) return false;
  from=Math.max(0, Number(from)||0);
  const jobs=[];
  for(const col of HCOLS){
    const lf=_loadedFrom[col];
    if(lf===undefined || from>=lf) continue;
    jobs.push(loadOlder(col, from, lf).catch(e=>console.error('older',col,e)));
  }
  if(!jobs.length) return false;
  await Promise.all(jobs);
  return true;
}
/* Huỷ đơn cũ: phải có dòng xuất kho của chính đơn đó mới hoàn kho đúng */
async function ensureOrderMovements(orderId){
  if(!UID||!orderId) return false;
  const have=(ST.state.stockMovements||[]).some(m=>m.refOrderId===orderId);
  if(have) return false;
  try{
    const qs=await getDocs(query(cpath('stockMovements'), where('refOrderId','==',orderId)));
    if(qs.empty) return false;
    const p=_parts.stockMovements; docsOf(qs).forEach(d=>p.extra.set(String(d.id),d));
    rebuildHeavy('stockMovements'); return true;
  }catch(e){ console.error('mv-of-order',e); return false; }
}
/* Tab Lịch sử kho: lấy 200 dòng mới nhất (đúng 200 lượt đọc) */
async function ensureLatestMovements(){
  if(!UID) return false;
  try{
    const qs=await getDocs(query(cpath('stockMovements'), orderBy('ts','desc'), limit(200)));
    if(qs.empty) return false;
    const p=_parts.stockMovements; let added=0;
    docsOf(qs).forEach(d=>{ const k=String(d.id); if(!p.extra.has(k)&&!p.win.has(k)){ p.extra.set(k,d); added++; } });
    if(added) rebuildHeavy('stockMovements');
    return added>0;
  }catch(e){ console.error('mv-latest',e); return false; }
}

/* STORE public (core.js gọi qua window.__STORE__) */
window.__STORE__ = {
  markDirty, flush,
  ensureRange, ensureOrderMovements, ensureLatestMovements,
  async load(){ if(!UID){ ST.state = ST.freshSeed?ST.freshSeed():ST.seed(); return; } await initialLoad(); attachListeners(); _ready=true; }
};

let _verTag=null,_updShown=false;
async function verCheck(){
  if(typeof location==='undefined' || !/^https?:/.test(location.protocol)) return;
  try{
    const r=await fetch(location.href,{method:'HEAD',cache:'no-store'});
    const t=(r.headers.get('etag')||'')+'|'+(r.headers.get('last-modified')||'');
    if(t==='|') return;
    if(_verTag===null){ _verTag=t; return; }
    if(t!==_verTag && !_updShown){ _updShown=true; showUpdateBar(); }
  }catch(e){}
}
function showUpdateBar(){
  if($('upd-bar')) return;
  const d=document.createElement('div'); d.id='upd-bar';
  d.style.cssText='position:fixed;left:12px;right:12px;bottom:14px;z-index:99;background:linear-gradient(135deg,#C9A24B,#9C7A2E);color:#1a1204;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.5)';

  document.body.appendChild(d);
}
if(typeof location!=='undefined' && /^https?:/.test(location.protocol)){

      title = 'Cài App trên máy tính';
      steps =
        '<div class="tsi-st"><i>1</i><div>Ở <b>thanh địa chỉ</b>, bấm biểu tượng <b>cài đặt</b> (màn hình có mũi tên ⤓ / dấu ⊕) bên phải.</div></div>'+
        '<div class="tsi-st"><i>2</i><div>Không thấy? Bấm <b>⋮</b> → <b>“Truyền, lưu và chia sẻ”</b> → <b>“Cài đặt trang này dưới dạng ứng dụng”</b>.</div></div>'+
        '<div class="tsi-st"><i>3</i><div>Bấm <b>Cài đặt</b>.</div></div>';
      note = '💡 Dùng <b>Chrome</b>, <b>Edge</b> hoặc <b>Cốc Cốc</b>. Firefox máy tính không cài được App.';
    }
    var ov = document.createElement('div'); ov.className = 'tsi-ov on'; ov.id = 'tsi-ov';
    ov.innerHTML =
      '<div class="tsi-md">'+
        '<h3>📲 '+title+'</h3>'+
        '<div class="tsi-sub">Cài xong: mở như app thật, không còn thanh trình duyệt, dùng được khi mất mạng.</div>'+
        steps+
        '<div class="tsi-note">'+note+'</div>'+
        '<button class="tsi-close" id="tsi-ok" type="button">Đã hiểu</button>'+
      '</div>';
    document.body.appendChild(ov);
    ov.onclick = function(e){ if (e.target === ov && ov.parentNode) ov.parentNode.removeChild(ov); };
    document.getElementById('tsi-ok').onclick = function(){ if (ov.parentNode) ov.parentNode.removeChild(ov); };
  }

  /* ---------- Bấm "Cài đặt" ---------- */
  function doInstall(){
    if (dp){
      var e = dp; dp = null;
      try{
        e.prompt();
        if (e.userChoice && e.userChoice.then){
          e.userChoice.then(function(r){
            if (r && r.outcome === 'accepted') killHeadBtn();   // đã cài -> gỡ nút
          }).catch(function(){});
        }
      }catch(err){ sheet(); }
      return;
    }
    sheet();                                   // iOS / chưa sẵn sàng -> hướng dẫn tay
  }
  window.tsInstallApp = doInstall;             // gọi tay bất cứ lúc nào

  /* ---------- Sự kiện trình duyệt ---------- */
  window.addEventListener('beforeinstallprompt', function(e){
    if (e && e.preventDefault) e.preventDefault();
    dp = e;
    if (installed()) return;
    headBtn();                                 // nút trong header: LUÔN CÒN
    bar();                                     // thanh gợi ý: 1 lần/phiên, tự ẩn
  });
  window.addEventListener('appinstalled', function(){
    dp = null; killBar(); killHeadBtn();
  });

  /* iOS không có beforeinstallprompt -> tự gắn nút + thanh sau khi app dựng xong */
  function boot(){
    if (installed()) return;
    if (isIOS){ headBtn(); bar(); }
  }
  if (document.readyState === 'complete' || document.readyState === 'interactive') setTimeout(boot, 1500);
  else window.addEventListener('DOMContentLoaded', function(){ setTimeout(boot, 1500); });
})();
</script>
